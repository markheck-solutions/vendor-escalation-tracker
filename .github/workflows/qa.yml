name: Droid QA

# Informational PR QA. This workflow does not block merges unless repository
# branch protection is later configured to require it.

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: qa-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Functional QA
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
      FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y -qq imagemagick

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Factory Droid
        run: curl -fsSL https://app.factory.ai/cli | sh

      - name: Run functional QA
        id: qa
        continue-on-error: true
        timeout-minutes: 18
        run: |
          mkdir -p qa-results
          droid exec --auto high "You are running in a non-interactive CI environment. There is NO human available. Do NOT use AskUser, do NOT wait for confirmations, and do NOT pause for input. Run the /qa skill against the checked-out branch using local dev server strategy. Write the final report to qa-results/report.md." 2>&1 | tee qa-results/qa-output.txt

      - name: Apply skill updates from QA
        id: apply-updates
        if: always() && steps.qa.outcome != 'cancelled'
        continue-on-error: true
        run: npx tsx scripts/apply-qa-skill-updates.ts qa-results/skill-updates.json

      - name: Commit skill updates
        if: always() && steps.apply-updates.outcome == 'success' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if git diff --quiet .factory/skills/; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .factory/skills/
          git commit -m "chore(qa): update failure catalog from QA run #${{ github.run_number }}"
          git push origin HEAD:${{ github.head_ref }}

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-results
          path: qa-results/
          retention-days: 14

      - name: Post QA report as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- qa-report -->';
            const reportPath = 'qa-results/report.md';
            const outputPath = 'qa-results/qa-output.txt';
            let report;

            if (fs.existsSync(reportPath)) {
              report = fs.readFileSync(reportPath, 'utf8');
            } else if (fs.existsSync(outputPath)) {
              const output = fs.readFileSync(outputPath, 'utf8');
              report = `## QA Report\n\n:grey_question: INCONCLUSIVE -- QA did not produce qa-results/report.md.\n\n<details>\n<summary>Raw QA output</summary>\n\n\`\`\`text\n${output.slice(-12000)}\n\`\`\`\n\n</details>`;
            } else {
              report = '## QA Report\n\n:grey_question: INCONCLUSIVE -- No QA output was produced.';
            }

            if (!report.trimStart().startsWith('## QA Report')) {
              report = `## QA Report\n\n${report}`;
            }

            const body = `${marker}\n${report}\n\n---\nArtifacts: [qa-results](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find((comment) => comment.body && comment.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
